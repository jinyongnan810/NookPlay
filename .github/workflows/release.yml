name: Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - keep

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -m1 "MARKETING_VERSION" JumpRec.xcodeproj/project.pbxproj \
            | sed 's/.*= //;s/;//;s/[[:space:]]//g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Bump version in project.pbxproj
        if: inputs.action != 'keep'
        id: bump
        run: |
          NEW_VERSION=$(python3 .github/scripts/bump_version.py "${{ inputs.action }}")
          echo "new_version=$(echo "$NEW_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: inputs.action != 'keep'
        run: |
          git add JumpRec.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Fast-forward merge main → production
        run: |
          git fetch origin production
          git checkout production
          git merge --ff-only origin/main
          git push origin production

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ inputs.action }}" = "keep" ]; then
            # Re-use the latest existing tag
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "No existing tag found; cannot use 'keep' without a previous release tag."
              exit 1
            fi
            echo "name=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Tag to re-create: $LATEST"
          else
            TAG="v${{ steps.bump.outputs.new_version }}"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
            echo "New tag: $TAG"
          fi

      - name: Delete existing release and tag (keep)
        if: inputs.action == 'keep'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Remove GitHub release (ignore errors if it doesn't exist)
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Remove remote tag
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Remove local tag
          git tag -d "$TAG" 2>/dev/null || true
          echo "Deleted release/tag: $TAG"

      - name: Generate release notes from commits
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          REPO="${{ github.repository }}"
          BASE_TAG=""

          if [ "${{ inputs.action }}" = "keep" ]; then
            # In keep mode TAG was deleted above, so the current latest tag is the base.
            BASE_TAG=$(git tag --sort=-v:refname | head -n 1 || true)
          else
            # For new releases, exclude the tag we are about to create if present locally.
            BASE_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
          fi

          NOTES_FILE="release-notes.md"
          : > "$NOTES_FILE"

          if [ -n "$BASE_TAG" ]; then
            RANGE="$BASE_TAG..HEAD"
            echo "Changes since $BASE_TAG" >> "$NOTES_FILE"
            echo >> "$NOTES_FILE"
            LOG=$(git log "$RANGE" --pretty=format:'%s')
          else
            echo "_Initial release_" >> "$NOTES_FILE"
            echo >> "$NOTES_FILE"
            LOG=$(git log --pretty=format:'%s')
          fi

          awk '
            BEGIN {
              sections[1] = "🚀 Features";
              sections[2] = "🐛 Fixes";
              sections[3] = "⚡ Performance";
              sections[4] = "♻️ Refactor";
              sections[5] = "📝 Docs";
              sections[6] = "🧪 Tests";
              sections[7] = "🛠 Maintenance";
              sections[8] = "📦 Other Changes";
            }
            {
              line = $0;
              lower = tolower(line);
              if (lower ~ /^feat(\(.+\))?: /) items["🚀 Features"] = items["🚀 Features"] "- " line "\n";
              else if (lower ~ /^fix(\(.+\))?: /) items["🐛 Fixes"] = items["🐛 Fixes"] "- " line "\n";
              else if (lower ~ /^perf(\(.+\))?: /) items["⚡ Performance"] = items["⚡ Performance"] "- " line "\n";
              else if (lower ~ /^refactor(\(.+\))?: /) items["♻️ Refactor"] = items["♻️ Refactor"] "- " line "\n";
              else if (lower ~ /^docs?(\(.+\))?: /) items["📝 Docs"] = items["📝 Docs"] "- " line "\n";
              else if (lower ~ /^test(s)?(\(.+\))?: /) items["🧪 Tests"] = items["🧪 Tests"] "- " line "\n";
              else if (lower ~ /^(chore|build|ci)(\(.+\))?: /) items["🛠 Maintenance"] = items["🛠 Maintenance"] "- " line "\n";
              else items["📦 Other Changes"] = items["📦 Other Changes"] "- " line "\n";
            }
            END {
              for (i = 1; i <= 8; i++) {
                section = sections[i];
                if (items[section] != "") {
                  print "## " section;
                  printf "%s", items[section];
                  print "";
                }
              }
            }
          ' <<< "$LOG" >> "$NOTES_FILE"

          echo "## 🔍 Code Diff" >> "$NOTES_FILE"
          if [ -n "$BASE_TAG" ]; then
            echo "- https://github.com/$REPO/compare/$BASE_TAG...$TAG" >> "$NOTES_FILE"
          else
            echo "- https://github.com/$REPO/commits/$TAG" >> "$NOTES_FILE"
          fi

          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated $NOTES_FILE"

      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --latest
          echo "Created release: $TAG"
