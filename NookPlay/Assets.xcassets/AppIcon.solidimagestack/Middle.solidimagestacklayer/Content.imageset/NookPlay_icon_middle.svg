<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF1E1" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#FFD7AE" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A4432"/>
      <stop offset="100%" stop-color="#3D2A22"/>
    </linearGradient>
    <clipPath id="safeCircle">
      <circle cx="512" cy="512" r="420"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1B120E" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <g clip-path="url(#safeCircle)">
    <g filter="url(#softShadow)">
      <rect x="232" y="274" width="560" height="476" rx="170" fill="url(#glass)"/>
      <rect x="270" y="312" width="484" height="400" rx="138" fill="url(#inner)"/>
    </g>
  </g>
</svg>
